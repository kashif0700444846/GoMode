name: Build GodMode APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: echo "y" | sudo ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "ndk;26.1.10909125" "cmake;3.22.1"

      - name: Verify NDK Installation
        run: |
          echo "NDK Path: ${ANDROID_HOME}/ndk/26.1.10909125"
          ls -la ${ANDROID_HOME}/ndk/ || echo "NDK directory not found"
          ls -la ${ANDROID_HOME}/cmake/ || echo "CMake directory not found"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle (with native libs)
        run: |
          ./gradlew assembleDebug --info --stacktrace
          echo "=== Checking for native libraries in jniLibs ==="
          find app/src/main/jniLibs -name "*.so" -type f || echo "No .so in jniLibs"
          echo "=== Checking APK contents ==="
          unzip -l app/build/outputs/apk/debug/app-debug.apk | grep "\.so$" || echo "No .so in APK"
          echo "=== Checking for godmoded in assets ==="
          find app/src/main/assets -name "godmoded" -type f || echo "No godmoded in assets"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GodMode-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
